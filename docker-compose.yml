services:
  postgres:
    image: postgres:16.13
    container_name: claimguard-postgres
    environment:
      POSTGRES_DB: claimguard
      POSTGRES_USER: claimguard
      POSTGRES_PASSWORD: claimguard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
