name: Performance

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  k6:
    name: k6 SLOs
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16.13
        env:
          POSTGRES_USER: claimguard
          POSTGRES_PASSWORD: claimguard
          POSTGRES_DB: claimguard
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Run Flyway migrations
        run: mvn --batch-mode --no-transfer-progress flyway:migrate

      - name: Build app jar
        run: mvn --batch-mode --no-transfer-progress package -DskipTests

      - name: Start app in background
        run: |
          java -jar target/claimguard-*.jar > app.log 2>&1 &
          echo $! > app.pid
          for i in {1..30}; do
            if curl -sSf http://localhost:8080/actuator/health > /dev/null; then
              echo "App is ready"
              exit 0
            fi
            sleep 2
          done
          echo "App did not become healthy in time"
          tail -100 app.log
          exit 1

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Run k6 scenarios
        run: ./perf/run-all.sh
        env:
          BASE_URL: http://localhost:8080
          OUTPUT_DIR: k6-reports

      - name: Stop app
        if: always()
        run: |
          if [ -f app.pid ]; then
            kill "$(cat app.pid)" || true
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-reports
          path: k6-reports/
          retention-days: 14
