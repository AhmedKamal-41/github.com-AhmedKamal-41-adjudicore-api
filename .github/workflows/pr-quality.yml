name: PR Quality

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  conventional-commits:
    name: Conventional Commit Titles
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
          requireScope: false
          subjectPattern: ^[a-z].+[^.]$
          subjectPatternError: |
            Subject must start with lowercase and not end with a period.

  pr-size-check:
    name: PR Size Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Warn on very large PRs
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
          LINES_CHANGED=$(git diff --shortstat "$BASE" "$HEAD" | awk '{print $4+$6}')
          echo "Lines changed: $LINES_CHANGED"
          if [ "${LINES_CHANGED:-0}" -gt 1000 ]; then
            echo "::warning::Large PR (>1000 lines changed). Consider splitting."
          fi
